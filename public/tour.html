<hotspot name="spot_3d_model" 
         url="images/查看产品.png" 
         ath="0.0" atv="0.0" 
         scale="0.5" 
         zoom="true"
         onclick="js(openThreeModel('device_001', '中央控制主机'));"
         onhover="showtext('查看 3D 模型展站');"
         /><!DOCTYPE html>
<html>
<head>
	<title>krpano全景项目开发</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
	<meta http-equiv="x-ua-compatible" content="IE=edge" />
	<style>
		html { height:100%; }
		body { height:100%; overflow:hidden; margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; font-size:16px; color:#FFFFFF; background-color:#000000; }
		
		/* 3D 模态框样式 */
		#model-modal {
			display: none;
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: rgba(0, 0, 0, 0.85);
			z-index: 9999;
			opacity: 0;
			transition: opacity 0.3s ease;
		}
		
		#model-modal.show {
			display: block;
			opacity: 1;
		}

		#model-iframe {
			width: 100%;
			height: 100%;
			border: none;
		}

		#close-btn {
			position: absolute;
			top: 20px;
			right: 30px;
			width: 40px;
			height: 40px;
			background: rgba(255, 255, 255, 0.2);
			color: white;
			border-radius: 50%;
			text-align: center;
			line-height: 40px;
			font-size: 24px;
			cursor: pointer;
			z-index: 10000;
			transition: background 0.2s;
			user-select: none;
		}

		#close-btn:hover {
			background: rgba(255, 255, 255, 0.4);
		}
	</style>
</head>
<body>

<script src="tour.js"></script>

<div id="pano" style="width:100%;height:100%;">
	<noscript><table style="width:100%;height:100%;"><tr style="vertical-align:middle;"><td><div style="text-align:center;">ERROR:<br/><br/>Javascript not activated<br/><br/></div></td></tr></table></noscript>
	<script>
		embedpano({xml:"tour.xml", target:"pano", html5:"only", mobilescale:1.0, passQueryParameters:"startscene,startlookat"});
		
		// 接收 Krpano 传来的打开指令
		function open3DModel() {
			var modal = document.getElementById('model-modal');
			var iframe = document.getElementById('model-iframe');
			// 加载你的 Three.js 项目入口
			iframe.src = '/index.html'; 
			modal.classList.add('show');
		}

		// 关闭模态框
		function close3DModel() {
			var modal = document.getElementById('model-modal');
			var iframe = document.getElementById('model-iframe');
			modal.classList.remove('show');
			// 延迟清空 src 以释放内存
			setTimeout(function() {
				iframe.src = '';
			}, 300);
		}
	</script>
</div>

<!-- 3D 弹窗容器 -->
<div id="model-modal">
	<div id="close-btn" onclick="close3DModel()">×</div>
	<iframe id="model-iframe" src=""></iframe>
</div>

</body>
</html>
